name: Post Automático Semanal

on:
  schedule:
    - cron: '0 11 * * 1'   # toda segunda-feira às 11h UTC (8h Brasília)
  workflow_dispatch:         # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  gerar-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install @google/generative-ai google-trends-api
        working-directory: .github/scripts

      - name: Gerar post com Gemini + Google Trends
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/gerar-post.js

      - name: Commit e push do post
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$NOME_ARQUIVO"
          git commit -m "[bot] Post automático - semana $SEMANA — $TEMA"
          git push
