backend:
  name: github
  repo: drptze-teste/sanopilates
  branch: main
  auth_type: pkce
  app_id: Ov23libD0ygLuYT2rpFl

# Pasta onde ficam as imagens enviadas pelo CMS
media_folder: "images/blog"
public_folder: "/images/blog"

# Idioma do painel
locale: pt

collections:
  - name: "posts"
    label: "Posts do Blog"
    label_singular: "Post"
    folder: "_posts"
    create: true
    # Gera o nome do arquivo automaticamente: YYYY-MM-DD-titulo.md
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "blog/{{year}}/{{month}}/{{day}}/{{slug}}/"
    fields:
      - label: "Título"
        name: "title"
        widget: "string"
        hint: "Título do post — aparece no card e no topo do artigo"

      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Data de publicação"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        date_format: "DD/MM/YYYY"
        time_format: "HH:mm"

      - label: "Resumo"
        name: "excerpt"
        widget: "text"
        hint: "Uma frase que aparece no card da listagem (max ~160 caracteres)"
        required: false

      - label: "Autor"
        name: "author"
        widget: "string"
        default: "Equipe Benesse"
        required: false

      - label: "Imagem de capa"
        name: "cover"
        widget: "image"
        required: false
        hint: "Aparece no topo do post e no card da listagem (recomendado: 1200×630 px)"

      - label: "Conteúdo"
        name: "body"
        widget: "markdown"
