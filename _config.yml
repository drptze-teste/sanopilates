title: "Benesse Pilates"
description: "Studio de Pilates · Chácara Santo Antônio — dicas, artigos e novidades sobre Pilates e bem-estar."
url: "https://sanopilates.com.br"
baseurl: ""

# Exclui arquivos que não precisam ser processados pelo Jekyll
exclude:
  - "imagens e video estudio/"
  - "PROJETO-BENESSE-PILATES-STATUS.md"
  - README.md
  - Gemfile
  - Gemfile.lock
  - functions/
  - node_modules/

# Permalink dos posts
# Posts em _posts/ (Pilates, sem categoria) → /blog/AAAA/MM/DD/titulo/
# Posts em estetica-e-bem-estar/_posts/ (categoria 'estetica-e-bem-estar') →
#   /estetica-e-bem-estar/blog/AAAA/MM/DD/titulo/
permalink: /:categories/blog/:year/:month/:day/:title/
