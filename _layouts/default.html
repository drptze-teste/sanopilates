<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page.title }} · Estúdio Benesse</title>
<meta name="description" content="{{ page.description | default: site.description }}" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#F4EFE6;
    --cream-2:#EDE6D8;
    --ink:#2B3327;
    --ink-soft:#56604F;
    --sage:#7C8B6F;
    --sage-deep:#5E6E52;
    --clay:#C16B43;
    --clay-deep:#A8542F;
    --line:rgba(43,51,39,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Hanken Grotesk',sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:500;line-height:1.1;letter-spacing:-.01em}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}

  /* ---------- TOPBAR ---------- */
  .topbar{
    background:#fff;
    border-bottom:1px solid var(--line);
    padding:10px 0;
  }
  .topbar-inner{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand-logo{
    display:flex;align-items:center;gap:12px;text-decoration:none;
  }
  .brand-logo img{
    height:52px;width:auto;
  }
  .brand-logo-text{
    display:flex;flex-direction:column;line-height:1.2;
  }
  .brand-logo-text strong{
    font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink);
  }
  .brand-logo-text span{
    font-size:12px;color:var(--ink-soft);font-weight:500;
  }
  .nav-links{display:flex;gap:24px;font-size:14px;font-weight:600;color:var(--ink-soft)}
  .nav-links a:hover{color:var(--clay)}
  .nav-links a.active{color:var(--clay)}

  @media(max-width:480px){
    .brand-logo img{height:40px}
    .brand-logo-text strong{font-size:15px}
    .brand-logo-text span{display:none}
  }

  /* ---------- FOOTER ---------- */
  .site-footer{
    margin-top:80px;
    padding:40px 0;
    border-top:1px solid var(--line);
    background:#fff;
  }
  .site-footer-inner{
    display:flex;flex-direction:column;align-items:center;gap:16px;
    text-align:center;
  }
  .site-footer img{height:56px;width:auto;opacity:.85}
  .site-footer p{font-size:13px;color:var(--ink-soft)}
  .site-footer a{color:var(--clay)}
</style>
</head>
<body>

<nav class="topbar">
  <div class="wrap topbar-inner">
    <a href="{{ site.baseurl }}/" class="brand-logo">
      <img src="{{ site.baseurl }}/images/logo-benesse-transparente.png" alt="Estúdio Benesse" />
      <div class="brand-logo-text">
        <strong>Estúdio Benesse</strong>
        <span>Pilates, Massagens e Recovery</span>
      </div>
    </a>
    <div class="nav-links">
      <a href="{{ site.baseurl }}/">Início</a>
      <a href="{{ site.baseurl }}/blog/" class="{% if page.layout == 'post' or page.url contains '/blog' %}active{% endif %}">Blog</a>
    </div>
  </div>
</nav>

{{ content }}

<footer class="site-footer">
  <div class="wrap site-footer-inner">
    <img src="{{ site.baseurl }}/images/logo-benesse.png" alt="Estúdio Benesse" />
    <p>© {{ 'now' | date: "%Y" }} Estúdio Benesse · Pilates, Massagens e Recovery<br>
    Chácara Santo Antônio, São Paulo</p>
  </div>
</footer>

<!-- GoatCounter — contagem de acessos (privacidade: sem cookies, sem IP armazenado) -->
<!-- Painel: https://benesseblogpilates.goatcounter.com  ·  conta em goatcounter.com -->
<script data-goatcounter="https://benesseblogpilates.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
